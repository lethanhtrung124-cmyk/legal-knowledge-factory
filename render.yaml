services:
  - type: web
    name: legal-knowledge-factory
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/healthz"
    envVars:
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_UPLOAD_BUCKET
        value: "legal-uploads"
      - key: SUPABASE_PACK_BUCKET
        value: "knowledge-packs"
