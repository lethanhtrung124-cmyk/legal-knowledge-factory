services:
  - type: web
    name: legal-knowledge-factory
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/healthz"
    envVars:
      - key: MAX_UPLOAD_MB
        value: "25"
